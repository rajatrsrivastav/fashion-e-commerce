services:
  # Backend (Express + Prisma)
  backend:
    build:
      context: ./server
    volumes:
      - ./server:/app   
      - /app/node_modules
    container_name: fashion_backend
    ports:
      - "4000:4000"   # Backend port
    environment:
      DATABASE_URL: "postgresql://neondb_owner:npg_2uU3ogeWBFwT@ep-holy-scene-a1c4gjwd-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      JWT_SECRET: "your-secret-key-change-this-in-production"
      PORT: 4000
      FRONTEND_URLS: "http://localhost:3000,https://d1621n1b9a7lcx.cloudfront.net,https://fashion-e-commerce-sepia.vercel.app"
      VITE_API_URL: "http://localhost:4000"
    command: npm run dev  
    depends_on: []

  # Frontend (React)
  frontend:
    build:
      context: ./client
    volumes:
      - ./client:/app
      - /app/node_modules
    container_name: fashion_frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: "http://localhost:4000"
    depends_on:
      - backend
    command: npm run dev  
    